version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: prepai-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: prepai-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - ALLOWED_ORIGINS=http://localhost
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: prepai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
